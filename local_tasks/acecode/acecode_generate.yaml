task: acecode_generate
dataset_path: TIGER-Lab/AceCode-87K
output_type: generate_until
training_split: train
test_split: train

doc_to_text: |
  {{question}}

  Write a complete Python function that solves the problem.
  Return only the Python code.

doc_to_target: "{{inferences[0]['completion']}}"

metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true

generation_kwargs:
  until:
    - "\nclass "
    - "\nif __name__"
    - "\nprint("
    - "\n# Example"
    - "\n###"
  max_gen_toks: 1024
  do_sample: false

repeats: 1
num_fewshot: 0

metadata:
  version: 1.0